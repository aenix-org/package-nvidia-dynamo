name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint platform components chart
        run: helm lint charts/cozy-dynamo-platform/

      - name: Lint tenant wrapper chart
        run: helm lint charts/cozy-nvidia-dynamo/

      - name: Lint cozystack-platform chart
        run: helm lint packages/core/platform/

      - name: Template platform components chart
        run: helm template ci-dryrun charts/cozy-dynamo-platform/ > /dev/null

      - name: Template tenant wrapper chart
        run: helm template ci-dryrun charts/cozy-nvidia-dynamo/ > /dev/null

      - name: Template cozystack-platform chart
        run: helm template ci-dryrun packages/core/platform/ > /dev/null

      - name: Validate platform manifests render to expected resources
        run: |
          rendered=$(helm template ci-dryrun packages/core/platform/)
          for kind in ApplicationDefinition OCIRepository PackageSource; do
            if ! grep -q "^kind: ${kind}$" <<<"$rendered"; then
              echo "::error::platform chart did not render a ${kind} resource"
              exit 1
            fi
          done
