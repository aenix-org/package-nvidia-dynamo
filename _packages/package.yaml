# Cluster-singleton install of the NVIDIA Dynamo platform (operator,
# NATS, Grove, kai-scheduler). Tenants do NOT create this CR — they
# create NvidiaDynamo CRs, which only render DynamoGraphDeployment
# objects against the operator deployed here.
#
# Apply once per cluster.
---
apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: nvidia-dynamo
  namespace: cozy-system
spec:
  variant: default
  components:
    cozy-dynamo-platform:
      # Per-component overrides go here when the operator wants to pin a
      # chart-level default cluster-wide.
      values: {}
