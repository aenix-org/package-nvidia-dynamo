# Cluster-singleton install of the NVIDIA Dynamo platform (operator,
# NATS, Grove, kai-scheduler). Apply once per cluster. The Package
# name matches the PackageSource it consumes (nvidia-dynamo-platform).
#
# Tenants do NOT create or see this CR. They create NvidiaDynamo CRs
# through the dashboard, which the cozystack-engine reconciles using
# the sibling `nvidia-dynamo` PackageSource (per-tenant DGD wrapper).
---
apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: nvidia-dynamo-platform
  namespace: cozy-system
spec:
  variant: default
  components:
    cozy-dynamo-platform:
      values: {}
