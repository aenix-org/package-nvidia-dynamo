{{- /*
  NATS for the Dynamo operator's event plane.

  We deliberately bypass the apps.cozystack.io/v1alpha1 NATS CR path here
  — that path is meant for tenant-managed NATS instances and lights up in
  the dashboard's NATS section. The Dynamo control-plane NATS is system
  infrastructure: a cluster operator should not see it listed as a tenant
  service in the marketplace, and a tenant should not be able to manage
  it from the dashboard.

  Instead we emit a flux HelmRelease directly against the same
  ExternalArtifact the apps.cozystack.io/v1alpha1 NATS CR is reconciled
  through (cozystack-nats-application-default-nats in cozy-system).
  cozystack-engine never sees this HelmRelease, so it stays invisible
  in the marketplace; the rendered chart still ships the same NATS
  install, monitoring, alert rules, and backup wiring as any tenant NATS.

  No HR.metadata.namespace — flux installs it in the same namespace as
  the parent platform release (cozy-dynamo). Service ends up at
  nats-<HR.name>.cozy-dynamo.svc:4222; the dynamo-operator natsAddr in
  values.yaml mirrors that.
*/}}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ .Release.Name }}-nats
spec:
  interval: 5m
  chartRef:
    kind: ExternalArtifact
    name: cozystack-nats-application-default-nats
    namespace: cozy-system
  values:
    replicas: 2
    resourcesPreset: t1.small
    jetstream:
      enabled: true
      size: 10Gi
    {{- with .Values.natsStorageClass }}
    storageClass: {{ . | quote }}
    {{- end }}
