{{- /*
  CiliumNetworkPolicy — apiserver round-trip + tenant ingress for the
  Dynamo operator and Grove.

  Two rules in one policy because Cilium applies default-deny on BOTH
  dimensions once a pod is selected by ANY policy:

  1. egress  — operator pods reach kube-apiserver:6443 to watch DGDs
                and update their CRD statuses. Cozystack tenant
                namespaces gate this on the `policy.cozystack.io/
                allow-to-apiserver: "true"` label; upstream charts do
                not expose a podLabels hook so we ship the rule by
                matching the well-known app.kubernetes.io/name labels
                instead.
  2. ingress — apiserver calls the operator's validating + conversion
                webhook on 9443 during every DGD create/update/list,
                and tenant Frontend / worker pods may call it for
                introspection. Without the explicit allow Cilium drops
                the apiserver leg with 'operation not permitted'
                because rule (1) alone already triggered default-deny.

  Selecting both apps in one matchExpressions keeps the policy a
  single Cilium endpoint match — same shape as the cluster-wide
  cozystack allow-to-apiserver policy.
*/}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-operator-network
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - dynamo-operator
          - grove-operator
  egress:
    - toEntities:
        - kube-apiserver
    - toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
  ingress:
    # apiserver-initiated webhook calls (validating + conversion).
    # Cilium evaluates after kube-proxy DNAT, so the rule matches on
    # the container's listening port (9443), not the Service port (443).
    - fromEntities:
        - kube-apiserver
        - cluster
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
