## @section Platform-wide defaults
##
## This chart installs the NVIDIA Dynamo platform components cluster-wide
## (operator + NATS + Grove + kai-scheduler). It is consumed by a Cozystack
## `Package` CR in `cozy-system` and is the cluster-singleton counterpart to
## the tenant-facing `cozy-nvidia-dynamo` chart, which only emits
## DynamoGraphDeployment CRs against the operator deployed here.
##
## NATS: lives in each tenant namespace, not here. The cozy-nvidia-dynamo
## tenant chart ships its own NATS HelmRelease + injects NATS_SERVER per
## DGD pod via the Frontend/worker envs. This keeps every NvidiaDynamo
## isolated to its own tenant ns (no cluster-wide NATS to saturate, no
## cross-namespace Cilium hops). The operator's natsAddr is intentionally
## left empty so the operator does NOT inject a platform-wide NATS_SERVER
## env that would override the per-DGD value at the bottom of the env
## list (Kubernetes envs use last-wins on duplicate names).
##
## etcd: the upstream chart's Bitnami etcd dependency is dropped during
## vendoring (Bitnami images are forbidden in this org). The operator is
## pinned to `discoveryBackend: kubernetes`, so neither it nor the worker
## runtime needs etcd — discovery flows through the Kubernetes API and
## NATS handles the event plane.

dynamo-platform:
  global:
    nats:
      # Per-tenant NATS — shipped from the cozy-nvidia-dynamo wrapper.
      install: false
    etcd:
      install: false
    grove:
      install: true
    kai-scheduler:
      install: false
  dynamo-operator:
    enabled: true
    # See cozy-nvidia-dynamo/values.yaml for the long-form reason.
    upgradeCRD: false
    discoveryBackend: kubernetes
    # Empty natsAddr — operator must not inject a NATS_SERVER env into
    # DGD pods, otherwise it overrides the tenant-local value set in
    # graph-deployment.yaml services.<svc>.envs.
    natsAddr: ""
    imagePullSecrets:
      - name: ngc-creds
    # Operator image must match the chart's argv contract. Chart 1.2.1
    # passes --config=/etc/dynamo-operator/config.yaml; the 0.x image
    # binary does NOT recognise that flag and crashes with
    # "flag provided but not defined: -config". Tag 1.2.1 was added on
    # nvcr.io after the initial 0.x train, but the chart still defaults
    # tag to .Chart.AppVersion (1.2.1) which lacks an OCI v2 manifest
    # without the right Accept header — Helm passes it through but the
    # kubelet handles content negotiation, so the runtime pull works.
    # Pinning explicitly keeps that contract explicit.
    controllerManager:
      manager:
        image:
          tag: "1.2.1"
    imagePullSecrets:
      - name: ngc-creds
    # Upstream chart 1.2.1 defaults the operator image tag to
    # .Chart.AppVersion (1.2.1), but NGC ships kubernetes-operator under
    # 0.x tags. Pin explicitly to the latest published tag.
    controllerManager:
      manager:
        image:
          tag: "0.7.0"
