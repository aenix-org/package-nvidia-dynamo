{{- /*
  DynamoGraphDeployment template — emits the tenant-facing CR that the
  upstream Dynamo operator (rendered by the dynamo-platform subchart)
  reconciles into a Frontend + worker Deployment graph.

  Schema reference (operator API): nvidia.com/v1alpha1 DynamoGraphDeployment
  as shipped in ai-dynamo/dynamo @ v1.2.1, see
  examples/backends/{vllm,sglang,trtllm}/deploy/*.yaml.

  Easy to get wrong, hard to spot:
    - resources.limits.gpu (NOT nvidia.com/gpu); the operator translates.
    - componentType must be "frontend" or "worker".
    - subComponentType "prefill"/"decode" is set only on workers and only
      in disaggregated mode; aggregated mode uses a single worker with no
      subComponentType.
    - mainContainer.image must be a Dynamo runtime image carrying both the
      worker engine and the backend toolkit; nvcr.io ships prebuilt
      <backend>-runtime images per backend.
*/}}
{{- if .Values.serving.enabled }}
{{- $disagg := gt (int .Values.serving.decodeReplicas) 0 -}}
{{- $backend := required "serving.backend is required (vllm|sglang|trtllm)" .Values.serving.backend -}}
{{- $workerClass := "" -}}
{{- if eq $backend "vllm"   }}{{- $workerClass = "VllmWorker"   -}}{{- end }}
{{- if eq $backend "sglang" }}{{- $workerClass = "SglangWorker" -}}{{- end }}
{{- if eq $backend "trtllm" }}{{- $workerClass = "TrtllmWorker" -}}{{- end }}
{{- if not $workerClass }}{{- fail (printf "unsupported serving.backend %q; expected vllm|sglang|trtllm" $backend) -}}{{- end }}
{{- $image := default (printf "nvcr.io/nvidia/ai-dynamo/%s-runtime:%s" $backend .Values.serving.imageTag) .Values.serving.image -}}
{{- /*
  Per-tenant NATS endpoint. Every DGD pod (Frontend + workers) gets it
  through the v1alpha1 .spec.services.<svc>.envs list rather than the
  operator's cluster-wide auto-inject — the platform operator's
  natsAddr is empty by design (see cozy-dynamo-platform/values.yaml).

  Cluster DNS domain comes from .Values._cluster["cluster-domain"]
  (injected by cozystack-engine into every tenant HR via the
  cozystack-values Secret). Cozystack clusters do NOT use the default
  cluster.local — ttk sets dnsDomain: cozy.local at the Talos level,
  and hardcoding cluster.local breaks DNS resolution from worker /
  frontend pods.
*/}}
{{- $clusterDomain := default "cluster.local" (index (.Values._cluster | default dict) "cluster-domain") -}}
{{- $natsServer := printf "nats://%s-nats.%s.svc.%s:4222" .Release.Name .Release.Namespace $clusterDomain -}}
{{- /* Pre-rendered fragments shared across all worker components. */ -}}
{{- $ctx := merge (dict "natsServer" $natsServer) . -}}
{{- $nodeSelector := include "cozy-nvidia-dynamo.nodeSelector"     $ctx -}}
{{- $envs         := include "cozy-nvidia-dynamo.workerEnvs"        $ctx -}}
{{- $argTail      := include "cozy-nvidia-dynamo.workerExtraArgs"   $ctx -}}
{{- $volumeMounts := include "cozy-nvidia-dynamo.workerVolumeMounts" $ctx -}}
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: {{ .Release.Name }}
spec:
  {{- if .Values.serving.modelCache.enabled }}
  # Persistent HuggingFace + torch.compile cache, mounted at
  # /home/dynamo/.cache on every worker (see services[].volumeMounts).
  #
  # `create: true` (default) — DGD operator creates a fresh PVC named
  # `<release>-model-cache`; lifecycle bound to this CR.
  #
  # `create: false` — DGD operator looks up an existing PVC by
  # `modelCache.name`. Set both to share a single cache across
  # multiple NvidiaDynamo CRs in the same tenant namespace; the
  # tenant admin pre-creates the PVC once (kubectl / kustomize /
  # standalone Application). Use RWX-capable storage when more than
  # one CR is going to mount it concurrently.
  pvcs:
    - name: {{ include "cozy-nvidia-dynamo.modelCachePvcName" . | quote }}
      create: {{ .Values.serving.modelCache.create }}
      {{- if .Values.serving.modelCache.create }}
      size: {{ .Values.serving.modelCache.size | quote }}
      storageClass: {{ .Values.serving.modelCache.storageClass | quote }}
      volumeAccessMode: {{ .Values.serving.modelCache.accessMode | quote }}
      {{- end }}
  {{- end }}
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      # NB: do NOT include `ingress: {enabled: false}` here.
      # dynamo-operator serialises the Frontend block into the
      # `nvidia.com/dgd-spec` annotation with `omitempty`, so
      # `enabled: false` is stripped and `ingress: {}` reaches the
      # reconciler — which then treats the empty object as
      # "ingress requested" and creates / deletes an Ingress named
      # `<release>-frontend` (overwriting the standalone Ingress we
      # ship in templates/ingress.yaml). Omitting the field entirely
      # leaves the operator no ingress hint at all, and our
      # standalone Ingress survives.
      {{- with .Values.serving.modelDownloadSecret }}
      envFromSecret: {{ . }}
      {{- end }}
      envs:
        {{- $envs | nindent 8 }}
      extraPodSpec:
        {{- with .Values.serving.imagePullSecrets }}
        imagePullSecrets:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        mainContainer:
          image: {{ $image | quote }}
    {{- if $disagg }}
    {{ $backend | title }}DecodeWorker:
      componentType: worker
      subComponentType: decode
      replicas: {{ .Values.serving.decodeReplicas }}
      {{- with .Values.serving.modelDownloadSecret }}
      envFromSecret: {{ . }}
      {{- end }}
      envs:
        {{- $envs | nindent 8 }}
      resources:
        limits:
          gpu: {{ .Values.serving.gpusPerWorker | quote }}
      {{- with $volumeMounts }}
      volumeMounts:
        {{- . | nindent 8 }}
      {{- end }}
      extraPodSpec:
        {{- with .Values.serving.imagePullSecrets }}
        imagePullSecrets:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $nodeSelector }}
        nodeSelector:
          {{- . | nindent 10 }}
        {{- end }}
        mainContainer:
          image: {{ $image | quote }}
          command: ["python3", "-m", "dynamo.{{ $backend }}"]
          args:
            - --model
            - {{ .Values.serving.modelName | quote }}
            - --disaggregation-mode
            - decode
            {{- with $argTail }}
            {{- . | nindent 12 }}
            {{- end }}
    {{ $backend | title }}PrefillWorker:
      componentType: worker
      subComponentType: prefill
      replicas: {{ .Values.serving.prefillReplicas }}
      {{- with .Values.serving.modelDownloadSecret }}
      envFromSecret: {{ . }}
      {{- end }}
      envs:
        {{- $envs | nindent 8 }}
      resources:
        limits:
          gpu: {{ .Values.serving.gpusPerWorker | quote }}
      {{- with $volumeMounts }}
      volumeMounts:
        {{- . | nindent 8 }}
      {{- end }}
      extraPodSpec:
        {{- with .Values.serving.imagePullSecrets }}
        imagePullSecrets:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $nodeSelector }}
        nodeSelector:
          {{- . | nindent 10 }}
        {{- end }}
        mainContainer:
          image: {{ $image | quote }}
          command: ["python3", "-m", "dynamo.{{ $backend }}"]
          args:
            - --model
            - {{ .Values.serving.modelName | quote }}
            - --disaggregation-mode
            - prefill
            - --kv-transfer-config
            - '{"kv_connector":"NixlConnector","kv_role":"kv_both"}'
            {{- with $argTail }}
            {{- . | nindent 12 }}
            {{- end }}
    {{- else }}
    {{ $workerClass }}:
      componentType: worker
      replicas: {{ .Values.serving.prefillReplicas }}
      {{- with .Values.serving.modelDownloadSecret }}
      envFromSecret: {{ . }}
      {{- end }}
      envs:
        {{- $envs | nindent 8 }}
      resources:
        limits:
          gpu: {{ .Values.serving.gpusPerWorker | quote }}
      {{- with $volumeMounts }}
      volumeMounts:
        {{- . | nindent 8 }}
      {{- end }}
      extraPodSpec:
        {{- with .Values.serving.imagePullSecrets }}
        imagePullSecrets:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $nodeSelector }}
        nodeSelector:
          {{- . | nindent 10 }}
        {{- end }}
        mainContainer:
          image: {{ $image | quote }}
          command: ["python3", "-m", "dynamo.{{ $backend }}"]
          args:
            - --model
            - {{ .Values.serving.modelName | quote }}
            {{- with $argTail }}
            {{- . | nindent 12 }}
            {{- end }}
    {{- end }}
{{- end }}
