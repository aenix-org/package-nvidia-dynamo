{{- /*
  HTTP Ingress for the Dynamo Frontend Service.

  Matches the canonical cozystack tenant pattern (see system/bootbox,
  system/monitoring, extra/seaweedfs): ingressClassName, host suffix,
  and cert-manager ClusterIssuer all come from the per-namespace
  cozystack-values Secret that the cozystack-engine injects into every
  tenant HelmRelease through valuesFrom. No tenant-facing knobs for
  these — the platform decides them once per namespace.

  Skipped when `ingress: false` (the default). When enabled, host
  defaults to `dynamo-<release>.<namespace-host>`, mirroring the
  bootbox / grafana convention.
*/}}
{{- if .Values.ingress }}
{{- $ingressClass := .Values._namespace.ingress -}}
{{- $clusterIssuer := default "letsencrypt-prod" (index .Values._cluster "issuer-name") -}}
{{- $solver := default "http01" (index .Values._cluster "solver") -}}
{{- $namespaceHost := .Values._namespace.host -}}
{{- $host := default (printf "dynamo-%s.%s" .Release.Name $namespaceHost) .Values.host -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-frontend
  annotations:
    cert-manager.io/cluster-issuer: {{ $clusterIssuer }}
    {{- if eq $solver "http01" }}
    acme.cert-manager.io/http01-ingress-ingressclassname: {{ $ingressClass }}
    {{- end }}
spec:
  ingressClassName: {{ $ingressClass }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ printf "%s-tls" .Release.Name | quote }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-frontend
                port:
                  name: http
{{- end }}
