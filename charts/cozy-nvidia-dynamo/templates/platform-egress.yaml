{{- /*
  CiliumNetworkPolicy — allow this tenant namespace to reach the
  cluster-wide dynamo-operator conversion webhook in cozy-dynamo.

  The operator publishes a conversion webhook for the
  nvidia.com/v1alpha1 <-> v1beta1 DynamoGraphDeployment migration.
  The apiserver invokes it during any LIST/GET of DGD objects from
  this tenant ns. Without this rule cozystack tenant default-deny
  blocks the cross-namespace hop and every `kubectl get
  dynamographdeployments` returns 'connect: operation not permitted'.

  NATS is NOT in this rule anymore — every NvidiaDynamo ships its own
  NATS HelmRelease in the same namespace (templates/nats.yaml), so
  Frontend/worker pods reach NATS in-namespace and the existing
  cozystack tenant intra-namespace allow rule covers them.
*/}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-to-dynamo-webhook
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cozy-dynamo
            k8s:app.kubernetes.io/name: dynamo-operator
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
            - port: "443"
              protocol: TCP
    # Dynamo worker pods register themselves through the k8s API
    # (DynamoWorkerMetadata CR + EndpointSlice reflector); without
    # apiserver egress the runtime spams `client error (Connect)` and
    # the Frontend never finds any worker (kept replying 503).
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
            - port: "443"
              protocol: TCP
