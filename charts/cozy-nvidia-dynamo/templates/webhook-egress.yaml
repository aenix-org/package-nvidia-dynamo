{{- /*
  CiliumNetworkPolicy — allow this tenant namespace to reach the
  cluster-wide dynamo-operator's conversion webhook on 443.

  The operator publishes a conversion webhook for
  nvidia.com/v1alpha1 <-> v1beta1 DynamoGraphDeployment. apiserver
  routes conversion calls THROUGH the operator's webhook Service in
  cozy-dynamo. Anything that LISTs DGDs in this namespace fails with
  'connect: operation not permitted' until the tenant namespace gets
  an explicit egress allow.

  Selecting all endpoints in the namespace by an empty endpointSelector
  on a NamespacedScope policy: every workload in this tenant ns can
  reach the webhook. Narrower targeting risks missing the apiserver
  proxy, which is what actually initiates the conversion call.
*/}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-to-dynamo-webhook
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cozy-dynamo
            k8s:app.kubernetes.io/name: dynamo-operator
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
            - port: "443"
              protocol: TCP
