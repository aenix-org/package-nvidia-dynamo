## @section External access
##

## @param {bool} ingress - Expose the Dynamo HTTP frontend through the tenant Ingress. Uses the namespace-scoped IngressClass and cert-manager ClusterIssuer cozystack already wires into every tenant — no extra config needed from the operator.
ingress: false

## @param {string} [host] - Override the public hostname. Empty falls back to `dynamo-<release>.<namespace-host>` where the host suffix is the tenant's namespace.host from the cozystack platform values.
host: ""

## @param {string} [ingressClass] - Override the IngressClass. Empty falls back to the namespace IngressClass cozystack-engine injects (per-tenant nginx). Set to `tenant-root` to publish through the root tenant's controller when the per-tenant controller cannot acquire a LoadBalancer IP. The cert-manager http01 solver annotation tracks this value automatically.
ingressClass: ""

## @section Model serving
##
## This chart emits a `DynamoGraphDeployment` CR which the cluster-wide
## dynamo-operator (deployed by the `cozy-dynamo-platform` package) reconciles
## into Frontend + worker Deployments. The wrapper does NOT install the
## operator / NATS / Grove itself — those are cluster singletons handled
## by `cozy-dynamo-platform`.

## @typedef {struct} ModelSpec
## @field {string} name - Worker component name (alphanumeric, used as DGD service name like `<Name>Worker`). Must be unique within the CR.
## @field {string} modelName - HuggingFace model ID or local path passed to `--model`.
## @field {int} [gpusPerWorker] - GPUs for THIS worker. Falls back to the top-level `serving.gpusPerWorker` when empty.
## @field {float} [gpuMemoryUtilization] - vLLM `--gpu-memory-utilization` for THIS worker. Empty falls back to top-level. Use when several workers share one GPU through device-plugin time-slicing.
## @field {[]string} [extraArgs] - Extra worker CLI args for THIS model. Appended after `--model`. Use here for model-specific flags (e.g. `--load-format=gguf` for a GGUF model).
## @field {string} [modelDownloadSecret] - Per-model HF_TOKEN Secret. Empty falls back to the top-level secret.

## @typedef {struct} Serving
## @field {bool} enabled - Emit a DynamoGraphDeployment CR for the model(s) below.
## @field {enum:vllm,sglang,trtllm} backend - Inference backend (applies to every model in the CR).
## @field {[]ModelSpec} models - Multi-model mode: when non-empty, one worker component is rendered per entry, all sharing the same Frontend. Frontend routes by the `model` field of the OpenAI-compat request to the worker that registered that model in NATS discovery. When empty, falls back to single-model mode using `modelName` below.
## @field {string} modelName - Single-model mode: HuggingFace model ID. Ignored when `models[]` is non-empty.
## @field {string} [modelDownloadSecret] - Name of a Secret with HF_TOKEN for gated HuggingFace models. The whole Secret is sourced into the worker pod via envFromSecret, so each key becomes an env var.
## @field {string} [image] - Full Dynamo runtime image override. Leave empty to use nvcr.io/nvidia/ai-dynamo/<backend>-runtime:<imageTag>.
## @field {string} imageTag - Tag for the default nvcr.io runtime image (ignored when `image` is set explicitly).
## @field {[]ImagePullSecret} imagePullSecrets - Image pull Secrets injected into every Frontend/worker pod. Required when pulling from nvcr.io (anonymous pulls return 404). Create the secret first with `kubectl create secret docker-registry ngc-creds --docker-server=nvcr.io --docker-username='$oauthtoken' --docker-password=<NGC_API_KEY>`.
## @field {int} prefillReplicas - Worker replicas in aggregated mode, or Prefill worker replicas in disaggregated mode.
## @field {int} decodeReplicas - Decode worker replicas. 0 disables disaggregation (single aggregated worker).
## @field {int} gpusPerWorker - GPUs per worker pod. Maps to resources.limits.gpu on the worker container.
## @field {string} [gpuProduct] - Shortcut: nodeSelector value for `nvidia.com/gpu.product` (e.g. NVIDIA-RTX-A6000). Merged into nodeSelector below; nodeSelector wins on conflict.
## @field {map[string]string} nodeSelector - Free-form nodeSelector applied to every worker pod (and any other GPU component). Use this to pin to a specific node (`kubernetes.io/hostname: gpu3`), GPU machine (`nvidia.com/gpu.machine: ...`), zone, or any label combination. Empty by default — the operator schedules anywhere a free `nvidia.com/gpu` slot is available.
## @field {float} [gpuMemoryUtilization] - vLLM convenience: cap the share of GPU VRAM a worker may take (0.0..1.0). Translates to `--gpu-memory-utilization=<v>` on the worker command line when the backend is vllm. Useful when several workers share the same physical GPU through device-plugin time-slicing. Empty = vLLM default (0.92). Ignored for sglang/trtllm — use extraArgs instead.
## @field {string} [huggingfaceEndpoint] - Override HuggingFace hub endpoint via `HF_ENDPOINT` env. Use a mirror (e.g. `https://hf-mirror.com`) for on-prem mirrors / locked-down networks where the public hub is unreachable.
## @field {ModelCache} modelCache - Persistent cache PVC mounted at /home/dynamo/.cache on every worker. Avoids re-downloading the model (HuggingFace `hub/`) and re-compiling CUDA graphs (vLLM `vllm/torch_compile_cache/`) on every pod restart.
## @field {[]string} extraArgs - Extra CLI args appended to the worker command. Backend-specific; for vllm common ones are `--gpu-memory-utilization=0.45` (cap VRAM share when sharing the GPU via time-slicing — prefer the dedicated `gpuMemoryUtilization` field above), `--max-model-len=8192`, `--tensor-parallel-size=2`. Items are passed verbatim, no quoting needed.

## @typedef {struct} ImagePullSecret
## @field {string} name - Name of an existing Secret of type kubernetes.io/dockerconfigjson in the same namespace as the NvidiaDynamo CR.

## @typedef {struct} ModelCache
## @field {bool} enabled - Mount the PVC on workers. When false, every pod restart redownloads the model (full HuggingFace pull) and re-runs torch.compile on the model weights (~10 s for 7B). Default off for backward compatibility.
## @field {bool} create - True (default) creates a fresh per-CR PVC named `<release>-model-cache`. False reuses an externally-managed PVC named `name` below — set this for a tenant-wide cache shared by every NvidiaDynamo CR in the namespace. In that case the tenant admin creates the PVC once (kubectl, kustomize, or its own Application), and every CR just mounts it.
## @field {string} [name] - When create=false, the existing PVC name to mount. Required when create=false. Ignored when create=true.
## @field {string} size - PVC size (only used when create=true). Should fit weights + torch_compile artifacts + safetensor scratch. Rough numbers for FP16: 0.5B ≈ 2 GiB, 7B ≈ 16 GiB, 13B ≈ 28 GiB, 70B ≈ 145 GiB. Default 50Gi covers everything up to a single 13B model with cache margin.
## @field {string} storageClass - StorageClass for the PVC (only used when create=true). cozystack ships `local` (RWO, zfs-thin, single-replica — fastest, lost on node loss) and `replicated` (RWO/RWX-capable, DRBD-replicated — survives node loss, ~2x slower writes). `replicated` is the safe default for a cache the user does not want to rebuild after a worker reschedule.
## @field {enum:ReadWriteOnce,ReadWriteMany} accessMode - PVC access mode (only used when create=true). RWO when only one worker pod per CR (prefillReplicas=1, decodeReplicas=0 — the common case). RWX when several workers (prefill + decode) want to share a single cache PVC, OR when the cache itself is shared across NvidiaDynamo CRs (create=false path); on cozystack `replicated` SC the LINSTOR CSI exposes RWX via the DRBD shared filesystem path (the same trick CDI uses for its `prime-*` scratch volumes).

## @param {Serving} serving - DynamoGraphDeployment configuration.
serving:
  enabled: true
  backend: vllm
  # Multi-model: when non-empty, single-model fields (modelName, extraArgs,
  # gpuMemoryUtilization, prefillReplicas, decodeReplicas) are ignored.
  # One worker per entry, all behind one Frontend. Example:
  #   models:
  #     - name: qwen-32b
  #       modelName: Qwen/Qwen3-32B
  #       gpusPerWorker: 1
  #     - name: olmocr
  #       modelName: allenai/olmOCR-2-7B-1025
  #       gpusPerWorker: 1
  models: []
  modelName: "Qwen/Qwen2.5-7B-Instruct"
  modelDownloadSecret: ""
  image: ""
  imageTag: "1.2.1"
  imagePullSecrets:
    - name: ngc-creds
  prefillReplicas: 1
  decodeReplicas: 0
  gpusPerWorker: 1
  gpuProduct: ""
  nodeSelector: {}
  gpuMemoryUtilization: null
  huggingfaceEndpoint: ""
  modelCache:
    enabled: false
    create: true
    name: ""
    size: 50Gi
    storageClass: replicated
    accessMode: ReadWriteMany
  extraArgs: []
