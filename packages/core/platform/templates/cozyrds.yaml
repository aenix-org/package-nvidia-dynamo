      {"title":"Chart Values","type":"object","properties":{"host":{"type":"string","description":"Public hostname for the Dynamo HTTP frontend ingress (leave empty to skip Ingress).","default":""},"serving":{"type":"object","default":{},"properties":{"enabled":{"type":"boolean","default":true,"description":"Emit a DynamoGraphDeployment CR for the model below. Disable to install the platform components only."},"backend":{"type":"string","enum":["vllm","sglang","trtllm"],"default":"vllm"},"modelName":{"type":"string","default":"Qwen/Qwen2.5-7B-Instruct"},"modelDownloadSecret":{"type":"string","default":"","description":"Secret with HF_TOKEN for gated HuggingFace models. Sourced via envFromSecret into worker pods."},"image":{"type":"string","default":"","description":"Full Dynamo runtime image override. Leave empty to use nvcr.io/nvidia/ai-dynamo/<backend>-runtime:<imageTag>."},"imageTag":{"type":"string","default":"0.7.0","description":"Tag for the default nvcr.io runtime image (ignored when image is set explicitly)."},"prefillReplicas":{"type":"integer","default":1,"minimum":0,"description":"Worker replicas in aggregated mode, or Prefill worker replicas in disaggregated mode."},"decodeReplicas":{"type":"integer","default":0,"minimum":0,"description":"Decode worker replicas. 0 disables disaggregation (aggregated single-worker mode)."},"gpusPerWorker":{"type":"integer","default":1,"minimum":1},"gpuProduct":{"type":"string","default":"","description":"Optional nodeSelector value for nvidia.com/gpu.product (e.g. RTX_A6000)."}}},"resources":{"type":"object","default":{},"properties":{"cpu":{"anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true,"default":8},"memory":{"type":"string","default":"32Gi"}}}}}
