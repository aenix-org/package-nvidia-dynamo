  name: nvidia-dynamo
spec:
  application:
    kind: NvidiaDynamo
    singular: nvidia-dynamo
    plural: nvidiadynamos
    openAPISchema: |-
      {"title":"Chart Values","type":"object","properties":{"ingress":{"type":"boolean","default":false,"description":"Expose the Dynamo HTTP frontend through the tenant Ingress. Uses the namespace IngressClass and cert-manager ClusterIssuer cozystack wires into every tenant."},"host":{"type":"string","default":"","description":"Override the public hostname. Empty defaults to dynamo-<release>.<namespace-host>."},"ingressClass":{"type":"string","default":"","description":"Override the IngressClass. Empty uses the per-tenant class. Set to tenant-root when the per-tenant ingress controller cannot acquire a LoadBalancer IP."},"serving":{"type":"object","default":{},"properties":{"enabled":{"type":"boolean","default":true,"description":"Emit a DynamoGraphDeployment CR for the model below. Disable to install the platform components only."},"backend":{"type":"string","enum":["vllm","sglang","trtllm"],"default":"vllm"},"models":{"type":"array","default":[],"description":"Multi-model: when non-empty, ignore modelName/extraArgs/gpuMemoryUtilization/prefillReplicas/decodeReplicas; one DGD worker per entry, all behind one Frontend that routes by request model field.","items":{"type":"object","required":["name","modelName"],"properties":{"name":{"type":"string","description":"Worker component name (alphanumeric, unique within CR)."},"modelName":{"type":"string","description":"HuggingFace model ID or path passed to --model."},"gpusPerWorker":{"type":"integer","minimum":1,"description":"Per-model GPU count. Empty falls back to top-level."},"gpuMemoryUtilization":{"type":"number","minimum":0,"maximum":1,"description":"Per-model vLLM --gpu-memory-utilization."},"extraArgs":{"type":"array","items":{"type":"string"},"description":"Per-model CLI args appended after --model."},"modelDownloadSecret":{"type":"string","description":"Per-model HF_TOKEN Secret. Empty falls back to top-level."}}}},"modelName":{"type":"string","default":"Qwen/Qwen2.5-7B-Instruct","description":"Single-model fallback; ignored when models[] is non-empty."},"modelDownloadSecret":{"type":"string","default":"","description":"Secret with HF_TOKEN for gated HuggingFace models. Sourced via envFromSecret into worker pods."},"image":{"type":"string","default":"","description":"Full Dynamo runtime image override. Leave empty to use nvcr.io/nvidia/ai-dynamo/<backend>-runtime:<imageTag>."},"imageTag":{"type":"string","default":"1.2.1","description":"Tag for the default nvcr.io runtime image (ignored when image is set explicitly)."},"prefillReplicas":{"type":"integer","default":1,"minimum":0,"description":"Worker replicas in aggregated mode, or Prefill worker replicas in disaggregated mode."},"decodeReplicas":{"type":"integer","default":0,"minimum":0,"description":"Decode worker replicas. 0 disables disaggregation (aggregated single-worker mode)."},"gpusPerWorker":{"type":"integer","default":1,"minimum":1},"gpuProduct":{"type":"string","default":"","description":"Shortcut: nodeSelector value for nvidia.com/gpu.product (e.g. NVIDIA-RTX-A6000). Merged into nodeSelector below."},"nodeSelector":{"type":"object","default":{},"additionalProperties":{"type":"string"},"description":"Free-form nodeSelector applied to every worker. Pin by hostname (kubernetes.io/hostname), GPU machine, zone, etc. Wins over gpuProduct on key conflict."},"gpuMemoryUtilization":{"type":"number","minimum":0,"maximum":1,"description":"vLLM: cap the share of GPU VRAM a worker may take (0.0..1.0). Maps to --gpu-memory-utilization. Useful when several workers share the GPU through device-plugin time-slicing. Ignored for sglang/trtllm — use extraArgs."},"huggingfaceEndpoint":{"type":"string","default":"","description":"Override HuggingFace hub endpoint via HF_ENDPOINT env. Use a mirror for on-prem networks where huggingface.co is unreachable."},"modelCache":{"type":"object","default":{},"description":"Persistent /home/dynamo/.cache PVC on workers — survives pod restarts so model weights and torch.compile artefacts are reused.","properties":{"enabled":{"type":"boolean","default":false},"create":{"type":"boolean","default":true,"description":"True creates a fresh per-CR PVC. False reuses an existing PVC named `name` — set for a tenant-wide cache shared across NvidiaDynamo CRs."},"name":{"type":"string","default":"","description":"PVC name to reuse when create=false."},"size":{"type":"string","default":"50Gi","description":"PVC size (create=true only). FP16 rule of thumb: 7B≈16Gi, 13B≈28Gi, 70B≈145Gi."},"storageClass":{"type":"string","default":"replicated","description":"StorageClass (create=true only). cozystack ships local (RWO, zfs-thin) and replicated (DRBD-replicated, survives node loss). replicated is the safe default."},"accessMode":{"type":"string","enum":["ReadWriteOnce","ReadWriteMany"],"default":"ReadWriteMany","description":"PVC access mode (create=true only). Defaults to RWX: cozystack's `replicated` SC (LINSTOR) supports RWX, which keeps the cache reusable when prefill+decode workers, or several NvidiaDynamo CRs, mount it concurrently. Drop to RWO only when storageClass does not support RWX."}}},"extraArgs":{"type":"array","default":[],"items":{"type":"string"},"description":"Extra CLI args appended to the worker command after --model. Backend-specific (vllm: --max-model-len=8192, --tensor-parallel-size=2; sglang: --mem-fraction-static=0.45). Items pass verbatim."}}},"resources":{"type":"object","default":{},"properties":{"cpu":{"anyOf":[{"type":"integer"},{"type":"string"}],"x-kubernetes-int-or-string":true,"default":8},"memory":{"type":"string","default":"32Gi"}}}}}
